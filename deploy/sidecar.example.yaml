# Argus sidecar config — claude-code adapter example.
#
# `id` is this sidecar's identity in the dashboard. Keep it stable so
# restarts look like the same agent. Make one file per machine/adapter.

id: claude-1
type: claude-code          # claude-code | codex | cursor-cli | <custom>
# machine is optional; defaults to the host's `os.Hostname()` (with the
# macOS `.local` mDNS suffix stripped). Pin it only if you want a
# friendlier label, or to disambiguate two sidecars on the same host.
# machine: prod-runner-7
# version is optional; when omitted the sidecar runs `<binary> --version`
# at boot and reports whatever that returns. Pin it only if auto-detect
# is wrong or the wrapped CLI doesn't implement --version.
# version: '1.2.3'

# Directory the wrapped CLI runs in. The CLI sees this as its $CWD, so all
# Read/Edit/Bash tools operate relative to it. Supports ~ and ${ENV} expansion.
# Leave unset to inherit the sidecar's own working directory.
workingDir: ~/code/my-project

bus:
  # Redis URL the control plane publishes to. Must be reachable from this host.
  # Carries commands / lifecycle / streaming results.
  url: redis://localhost:6379

# Required when `terminal.enabled: true`. The sidecar opens a direct
# WebSocket to the server for PTY traffic — Redis Streams added
# ~50-150ms of latency per keystroke, which felt laggy on echo.
# server:
#   url: http://localhost:4000
#   token: ${SIDECAR_LINK_TOKEN}    # must match the server's env var

adapter:
  # Override the `claude` binary if it isn't on PATH.
  binary: claude

# Optional: expose an interactive terminal in the dashboard's right panel.
# THIS IS REMOTE SHELL ACCESS — only enable on hosts where every dashboard
# user is trusted with shell-as-sidecar-user privileges.
# terminal:
#   enabled: true
#   shells: ["/bin/zsh", "/bin/bash", "/bin/sh"]
#   defaultShell: /bin/zsh    # optional; falls back to $SHELL ∩ shells, then shells[0]
#   maxSessions: 5            # cap concurrent open PTYs per sidecar
#   cwd: ~/work               # optional; defaults to workingDir above

