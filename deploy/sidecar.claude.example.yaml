id: claude-1
type: claude-code
# machine is optional; defaults to the host's `os.Hostname()` (with the
# macOS `.local` mDNS suffix stripped). Pin it only if you want a
# friendlier label, or to disambiguate two sidecars on the same host.
# machine: local
# version: '1.2.3'   # optional; auto-detected from `claude --version` at boot
workingDir: ~/code/my-project
bus:
  url: redis://localhost:6379
adapter:
  binary: claude
  # Pass --dangerously-skip-permissions so tool calls execute without per-call
  # TTY approval prompts. Required for headless operation (the sidecar has no
  # TTY to accept prompts through). Set to false to force approvals, which
  # will hang any tool-using turn.
  dangerouslySkipPermissions: true
  # Optional: pin an explicit permission mode instead of the skip flag above.
  # Takes precedence over `dangerouslySkipPermissions` when set.
  # One of: default | acceptEdits | bypassPermissions | plan
  # permissionMode: acceptEdits
  # Optional: extra flags appended to every `claude` invocation.
  # extraArgs: ["--max-turns", "10"]
