server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text-y assets. Vite already minifies, but this trims the wire.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml text/javascript image/svg+xml;

    # Hashed assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Runtime config is regenerated by the entrypoint on every container
    # start, so it MUST never be cached — otherwise a CDN or browser
    # could pin a stale apiUrl across deploys. Same headers as `/`,
    # called out separately so the intent is obvious.
    location = /config.js {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so React Router
    # can take over. index.html itself is always served fresh.
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
