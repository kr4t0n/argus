id: cursor-1
type: cursor-cli
# machine is optional; defaults to the host's `os.Hostname()` (with the
# macOS `.local` mDNS suffix stripped). Pin it only if you want a
# friendlier label, or to disambiguate two sidecars on the same host.
# machine: local
# version: '1.0.0'   # optional; auto-detected from `cursor-agent --version` at boot
workingDir: ~/code/my-project
bus:
  url: redis://localhost:6379
adapter:
  binary: cursor-agent
  # Pass --yolo so tool calls execute without per-call approval prompts.
  # Required for headless operation — the sidecar has no TTY to approve
  # through, so leaving this off will hang any tool-using turn forever.
  yolo: true
  # Optional: extra flags appended to every `cursor-agent` invocation
  # (before the prompt, after the built-in flags).
  # extraArgs: ["--max-turns", "10"]
