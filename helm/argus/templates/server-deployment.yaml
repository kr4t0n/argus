{{- if .Values.server.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argus.server.fullname" . }}
  labels:
    {{- include "argus.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      # Important: only one extra pod at a time. The boot path runs
      # `prisma migrate deploy` (idempotent but serial); two boots in
      # parallel against a fresh DB occasionally race the advisory lock.
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "argus.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argus.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Bounce pods on Secret/ConfigMap changes so a `helm upgrade`
        # that only flips an env var still rolls the deployment.
        checksum/secret: {{ include (print $.Template.BasePath "/server-secret.yaml") . | sha256sum }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "argus.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "argus.server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.containerPort }}
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: {{ .Values.server.containerPort | quote }}
            - name: JWT_EXPIRES_IN
              value: {{ .Values.auth.jwtExpiresIn | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.auth.adminEmail | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.externalDatabase.existingSecret }}
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretKey }}
                  {{- else }}
                  name: {{ include "argus.secret.name" . }}
                  key: DATABASE_URL
                  {{- end }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.externalRedis.existingSecret }}
                  name: {{ .Values.externalRedis.existingSecret }}
                  key: {{ .Values.externalRedis.existingSecretKey }}
                  {{- else }}
                  name: {{ include "argus.secret.name" . }}
                  key: REDIS_URL
                  {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "argus.secret.name" . }}
                  key: JWT_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "argus.secret.name" . }}
                  key: ADMIN_PASSWORD
            {{- if or .Values.auth.sidecarLinkToken .Values.auth.existingSecret }}
            - name: SIDECAR_LINK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "argus.secret.name" . }}
                  key: SIDECAR_LINK_TOKEN
                  optional: true
            {{- end }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.server.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
