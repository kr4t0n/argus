apiVersion: v2
name: argus
description: |
  Argus — multi-machine agent management dashboard. This chart deploys the
  control plane (NestJS server + React web UI). PostgreSQL and Redis are
  intentionally NOT bundled — point at your own managed instances or run
  the bitnami subcharts alongside.
type: application

# Chart version is independent of the app it ships. Bump on chart changes.
# 0.1.2-test.1 — pre-release marker for a smoke test of helm-publish CI
# against a manually-built docker image. Bump to 0.1.2 (stable) once the
# runtime-config images are merged + published via docker-publish.yml.
version: 0.1.2-test.1
# App version tracks the Docker image tags pulled by default. The
# `manual-*` tag below points at a docker image built from this branch
# by hand (workflow_dispatch on docker-publish) so the chart can pull
# the runtime-VITE-env-vars feature without waiting for a main merge.
appVersion: "manual-24629223743"

home: https://github.com/kr4t0n/argus
sources:
  - https://github.com/kr4t0n/argus
keywords:
  - argus
  - agents
  - claude-code
  - codex
  - cursor-cli
maintainers:
  - name: kr4t0n
    url: https://github.com/kr4t0n
