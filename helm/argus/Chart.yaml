apiVersion: v2
name: argus
description: |
  Argus — multi-machine agent management dashboard. This chart deploys the
  control plane (NestJS server + React web UI). PostgreSQL and Redis are
  intentionally NOT bundled — point at your own managed instances or run
  the bitnami subcharts alongside.
type: application

# Chart version is independent of the app it ships. Bump on chart
# changes. Releasing a new chart version only requires bumping this
# field — see helm-publish.yml. Prerelease versions (-rc.N) are hidden
# from plain `helm search`/`helm upgrade`; install them with
# `--version 0.2.7-rc.3` (or `--devel`).
version: 0.2.7-rc.3
# App version tracks the Docker image tags pulled by default. Bump in
# lockstep with `version` whenever the chart starts requiring features
# only present in newer images; otherwise it can lag.
#
# 0.2.7-rc.3 pins the `sha-2b48436` dev image, which fixes doubled push
# notifications: the ingestor now finalizes a turn exactly once (the
# sidecar emits two terminal chunks per turn; the finalize block —
# including the APNs alert — ran per chunk), alert pushes carry
# apns-collapse-id, and cancelled turns no longer push or get flipped
# to 'completed'. Server-side fix — works with any sidecar version;
# sidecar v0.2.7-rc.2 removes the redundant chunk at the source.
#
# 0.2.7-rc.2 lets `apns.existingSecret` supply the WHOLE trio — with it
# set, teamId/keyId may be left empty and are read from the Secret
# (keys APNS_TEAM_ID / APNS_KEY_ID, renamable via
# existingSecretTeamIdKey / existingSecretKeyIdKey); inline values
# still win. Same app image as rc.1.
#
# 0.2.7-rc.1 is a prerelease cut from `dev` for the native iOS/iPadOS
# client: the chart grows an `apns` values block (APNS_TEAM_ID /
# APNS_KEY_ID / APNS_KEY_BASE64 + optional topic/env) so the server can
# send push notifications and Live Activity updates to the app. Push is
# all-or-nothing and off by default — existing web-only installs need no
# values changes. appVersion pins the immutable `sha-6cb9f9f` dev image
# (there is no 0.2.7 image tag yet), which ships the iOS support: the
# /me/devices + /me/live-activities endpoints, the APNs sender, and the
# split fs/git notify stream. Carries database migrations
# (device tokens + live-activity tokens) applied automatically on boot
# via `prisma migrate deploy`. Pair with sidecar v0.2.7-rc.1 on agent
# hosts to test the notify-stream split.
#
# 0.2.6 is a control-plane (web) release with no schema change, adding two
# UI features: the prompt queue now drains app-wide in the background —
# queued follow-ups keep sending for any session as its agent frees up,
# regardless of which session is open, and sessions that share an agent
# run in parallel (per-session serialization only). And the Diff pane's
# per-file diffs are now collapsible and height-capped (scroll inside a
# file) so one huge patch can't dominate the pane. The bundled sidecar is
# unchanged from 0.2.5 — the parallel per-session execution these rely on
# is existing sidecar behaviour — but a matching argus-sidecar release is
# cut in lockstep for agent hosts.
#
# 0.2.5 adds revocable, read-only API keys: a second credential type
# (sent via the `X-API-Key` header) alongside JWT login, managed from a
# new user-panel section, so machine-to-machine callers can reach the
# REST API without a password. Ships a database migration (16_api_keys)
# that the server image applies automatically on boot via `prisma
# migrate deploy`. (This release also carries a sidecar change — the
# per-agent Redis command readers are collapsed into one machine-wide
# reader so connection count scales with machines, not agents — shipped
# separately via the argus-sidecar release for agent hosts.)
#
# 0.2.4 is a small control-plane (web) refinement with no schema change:
# the streaming preamble/thinking now folds directly into the activity
# pill (instead of a separate preview block that flashed and relocated
# when a tool followed), so only the settled final answer lands in the
# response body. (This release also carries a sidecar change — codex now
# bypasses approvals + sandbox directly instead of via --full-auto —
# shipped separately via the argus-sidecar release for agent hosts.)
#
# 0.2.3 is a control-plane (web) release with no schema change: a prompt
# queue that lets you line up follow-up messages while a turn is running
# (edit/remove them before they send), streaming preamble/thinking now
# kept in the activity area instead of flashing in the response body, and
# long-link wrapping in assistant markdown. (This release also carries
# sidecar argus-bg self-update, shipped separately via the argus-sidecar
# release for agent hosts.)
#
# 0.2.2 adds the opt-in Diff extension (a session right-panel tab showing
# the most recent turn's per-file diffs) and refactors session status to
# fix the sticky sidebar "done"/"failed" dots. Ships a database migration
# (10_session_unread) that the server image applies automatically on boot
# via `prisma migrate deploy`.
#
# 0.2.1 ships the per-session model picker and support for Claude Code
# ≥ 2.1.x task tools (TaskCreate/TaskUpdate/TaskList rendered in the
# To-dos panel; pair with sidecar ≥ v0.2.1 on agent hosts).
#
# 0.2.0 shipped file/image attachments — the default images include the
# attachment module, so `objectStore` works out of the box (set the
# endpoint + bucket + creds to enable it).
appVersion: "sha-2b48436"

