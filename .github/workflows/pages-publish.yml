name: pages-publish

# Publish the Argus marketing site to GitHub Pages at
#   https://kr4t0n.github.io/argus/
# (the root of the gh-pages branch).
#
# The Helm chart is published by helm-publish.yml at /argus/helm/. Both
# workflows write to gh-pages, so they share a concurrency group
# (gh-pages-publish) to serialize pushes. We rsync site/dist/ into the
# branch root with --exclude='helm/' so the chart artifacts the other
# workflow owns are never touched here.
#
# Trigger: any push to main that touches site/** or this workflow.
# Manual workflow_dispatch is also wired for ad-hoc rebuilds.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages-publish.yml'
  workflow_dispatch:

permissions:
  contents: write   # required to push commits to gh-pages

concurrency:
  # Shared with helm-publish.yml so we never race on `git push gh-pages`.
  # cancel-in-progress: false because each run finalizes a pushed commit
  # we don't want to lose.
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install + build site
        working-directory: site
        env:
          # Astro `base` for Pages is the repo name, e.g. `/argus/`.
          # astro.config.mjs reads this off process.env.ASTRO_BASE.
          ASTRO_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Sync site/dist into gh-pages root (preserve helm/)
        run: |
          set -euo pipefail
          # rsync everything from site/dist/ into the branch root.
          # --delete prunes stale files BUT --exclude='helm/' protects
          # the chart repo owned by helm-publish.yml.
          rsync -a --delete \
            --exclude='helm/' \
            --exclude='.git/' \
            site/dist/ pages/

      - name: Commit & push to gh-pages
        working-directory: pages
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          # Skip the commit if the build was deterministically identical.
          if git diff --staged --quiet; then
            echo "no site changes — nothing to publish"
            exit 0
          fi
          git commit -m "chore(site): publish site from ${GITHUB_SHA::7}"
          git push origin gh-pages
