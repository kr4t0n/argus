<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Argus — Agent Dashboard</title>
    <!--
      Inline blocking script: resolve theme + apply the `dark` class on
      <html> BEFORE the browser paints the body. Mirrors
      applyThemeImmediate() in src/lib/theme.ts (which still runs
      again from main.tsx for symmetry with hot-reload). Inlining here
      avoids the flash of wrong-themed content that a script-module
      can't prevent — module scripts are deferred to after parse.
    -->
    <script>
      (function () {
        try {
          var pref = 'system';
          var raw = localStorage.getItem('argus.ui');
          if (raw) {
            var t = JSON.parse(raw)?.state?.theme;
            if (t === 'light' || t === 'dark' || t === 'system') pref = t;
          }
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {
          /* storage unavailable — fall through to CSS default (light) */
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <!--
      Runtime config — generated by the docker entrypoint from
      ARGUS_API_URL / ARGUS_WS_URL container env vars. MUST load before
      the bundle so `host.ts` can read window.__ARGUS_CONFIG__ on its
      first call. In dev `public/config.js` is served as a no-op stub.
    -->
    <script src="/config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
