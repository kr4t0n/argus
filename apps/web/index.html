<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Argus — Agent Dashboard</title>
  </head>
  <body class="bg-neutral-950 text-neutral-100 antialiased">
    <div id="root"></div>
    <!--
      Runtime config — generated by the docker entrypoint from
      ARGUS_API_URL / ARGUS_WS_URL container env vars. MUST load before
      the bundle so `host.ts` can read window.__ARGUS_CONFIG__ on its
      first call. In dev `public/config.js` is served as a no-op stub.
    -->
    <script src="/config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
