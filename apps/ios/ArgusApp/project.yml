# XcodeGen manifest — `xcodegen generate` produces ArgusApp.xcodeproj
# (never committed; Info.plist below is generated too). Re-run only when
# adding/renaming sources or editing this file.
#
# Device builds & push: personal settings live in an OPTIONAL, gitignored
# `local.yml` next to this file so they survive regeneration. Example:
#
#   targets:
#     ArgusApp:
#       settings:
#         base:
#           DEVELOPMENT_TEAM: AB12CD34EF   # Xcode → Settings → Accounts
#       # Paid Apple Developer teams only — enables push notifications.
#       # (Free personal teams can't sign this capability; leave it out.)
#       entitlements:
#         path: ArgusApp.entitlements
#         properties:
#           aps-environment: development
name: ArgusApp
include:
  - path: local.yml
    optional: true
options:
  bundleIdPrefix: app.argus
  deploymentTarget:
    iOS: '17.0'
  xcodeVersion: '16.0'

packages:
  ArgusKit:
    path: ../ArgusKit
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.2.0

targets:
  ArgusApp:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - Sources
    dependencies:
      - package: ArgusKit
      - package: MarkdownUI
        product: MarkdownUI
      - package: SwiftTerm
        product: SwiftTerm
    scheme: {}
    info:
      path: Info.plist
      properties:
        # Self-hosted Argus servers on LAN/localhost are plain http.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.argus.ios
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: '1,2' # iPhone + iPad
        SWIFT_VERSION: '5.10'
        # Signing stays ENABLED: Simulator builds need no team, device
        # builds pick one up from local.yml (or the Signing pane — but
        # that choice is lost on the next `xcodegen generate`).
        # Never set CODE_SIGNING_ALLOWED=NO here — it silently produces
        # unsigned binaries that devices refuse to run, even with a team
        # selected in Xcode. CI disables signing on the xcodebuild
        # command line instead.
        CODE_SIGN_STYLE: Automatic
