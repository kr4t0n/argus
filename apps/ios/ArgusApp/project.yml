# XcodeGen manifest — `xcodegen generate` produces ArgusApp.xcodeproj
# (never committed; Info.plist below is generated too). Re-run only when
# adding/renaming sources or editing this file.
name: ArgusApp
options:
  bundleIdPrefix: app.argus
  deploymentTarget:
    iOS: '17.0'
  xcodeVersion: '16.0'

packages:
  ArgusKit:
    path: ../ArgusKit
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

targets:
  ArgusApp:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - Sources
    dependencies:
      - package: ArgusKit
      - package: MarkdownUI
        product: MarkdownUI
    scheme: {}
    entitlements:
      path: ArgusApp.entitlements
      properties:
        # Sandbox push (Xcode/Simulator builds). Archive/export flips
        # this to production automatically. Remote push in the Simulator
        # needs an Apple silicon Mac (supported since Xcode 14).
        aps-environment: development
    info:
      path: Info.plist
      properties:
        # Self-hosted Argus servers on LAN/localhost are plain http.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.argus.ios
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: '1,2' # iPhone + iPad
        SWIFT_VERSION: '5.10'
        # Simulator needs no signing team. For a physical device, delete
        # these two lines and set a team in Signing & Capabilities.
        CODE_SIGNING_ALLOWED: 'NO'
        CODE_SIGN_IDENTITY: ''
